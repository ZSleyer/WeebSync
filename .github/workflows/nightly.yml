name: nightly

# Nightly image of the latest main, plus on-demand via the Actions "Run
# workflow" button. Replaces the old per-push :dev image so the HA add-on (which
# tracks :nightly) updates at most once a day instead of on every push.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  nightly-image:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # nightly-<shortsha> already in the registry means HEAD hasn't moved since
      # the last build; skip the rebuild so identical nightlies don't pile up.
      - name: Check if HEAD is already built
        id: fresh
        run: |
          if docker manifest inspect "ghcr.io/${GITHUB_REPOSITORY,,}:nightly-${GITHUB_SHA::7}" >/dev/null 2>&1; then
            echo "nightly-${GITHUB_SHA::7} already exists, skipping build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.fresh.outputs.skip != 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - if: steps.fresh.outputs.skip != 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - if: steps.fresh.outputs.skip != 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly
            type=raw,value=nightly-{{sha}}
      - if: steps.fresh.outputs.skip != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=nightly
            CHANNEL=nightly
            COMMIT=${{ github.sha }}
            REPO=${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Prune nightlies older than 2 days plus orphaned multi-arch children.
  # Release tags stay untouched. packages must be lowercase - the registry
  # package is "weebsync", deriving it from the repo name ("WeebSync") 404s.
  cleanup:
    runs-on: ubuntu-latest
    needs: nightly-image
    if: always() && needs.nightly-image.result == 'success'
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          packages: weebsync
          delete-tags: "nightly-*,dev-*"
          older-than: 2 days
          exclude-tags: "nightly,latest,v*"
          delete-untagged: true
          delete-ghost-images: true
          delete-partial-images: true
          token: ${{ secrets.GITHUB_TOKEN }}
