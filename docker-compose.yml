services:
  weebsync:
    build: .
    # image: ghcr.io/ch4d1/weebsync:latest
    ports:
      # session auth runs over plain HTTP — bind to loopback and put a
      # TLS-terminating reverse proxy in front. Use "8080:8080" only on a
      # trusted host you fully control.
      - "127.0.0.1:8080:8080"
    environment:
      # optional: key for credential encryption at rest. If unset, a key is
      # auto-generated at /data/secret.key on first start.
      # WEEBSYNC_SECRET: ${WEEBSYNC_SECRET}
      # optional: AniList API token (higher rate limit)
      # ANILIST_TOKEN: ""
      # optional: OIDC login (Authentik/Keycloak/…)
      # OIDC_ISSUER: https://auth.example.com/application/o/weebsync/
      # OIDC_CLIENT_ID: weebsync
      # OIDC_CLIENT_SECRET: "…"
      # OIDC_REDIRECT_URL: https://weebsync.example.com/api/auth/oidc/callback
    volumes:
      - ./data:/data # sqlite db + downloads (downloads under /data/downloads)
    restart: unless-stopped
